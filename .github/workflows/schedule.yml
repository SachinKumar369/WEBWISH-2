name: Scheduled Front-Desk Tests

on:
  schedule:
    # Runs at 9:30 AM IST Mon–Fri
    # GitHub Actions uses UTC → 9:30 AM IST = 4:00 AM UTC
    - cron: '0 4 * * 1-5'

  # Allow manual trigger from GitHub UI for testing
  workflow_dispatch:

jobs:
  run-tests:
    name: Run Front-Desk Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Install Playwright browsers ───────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── 5. Run tests ──────────────────────────────────────────────────────
      - name: Run front-desk tests
        id: run_tests
        run: |
          npx playwright test tests/front-desk/ \
            --reporter=html,line \
            --output=test-results
        continue-on-error: true   # keep pipeline alive so report is always uploaded
        env:
          # Add any env variables your WISH PMS tests need, e.g.:
          # BASE_URL: ${{ secrets.BASE_URL }}
          # AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          CI: true

      # ── 6. Upload HTML report as artifact ────────────────────────────────
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      # ── 7. Upload raw test results ────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

      # ── 8. Send failure email via GitHub Actions native email step ────────
      #
      #  GitHub Actions does NOT have a built-in SMTP mailer.
      #  The best "no external SMTP" approach is dawidd6/action-send-mail
      #  using Gmail OAuth2 / App Password stored as GitHub Secrets.
      #
      #  Required secrets to add in your repo:
      #    MAIL_USERNAME   → your Gmail address (e.g. qa-alerts@gmail.com)
      #    MAIL_PASSWORD   → Gmail App Password (16-char, NOT your login password)
      #    MAIL_RECIPIENT  → comma-separated list of recipients
      #
      - name: Send failure email
        if: steps.run_tests.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: |
            ❌ [WISH PMS] Front-Desk Tests FAILED — Run #${{ github.run_number }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: WISH PMS QA Alerts <${{ secrets.MAIL_USERNAME }}>
          body: |
            Hi Team,

            The scheduled Playwright test run for the Front-Desk module has FAILED.

            ────────────────────────────────────────
            📋 Run Details
            ────────────────────────────────────────
            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Run #      : ${{ github.run_number }}
            Triggered  : ${{ github.event_name }}
            Timestamp  : ${{ github.event.head_commit.timestamp }}

            ────────────────────────────────────────
            🔗 View Full Report
            ────────────────────────────────────────
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The HTML report is attached as an artifact in the link above.
            Download it, open index.html in your browser for the full test details.

            ────────────────────────────────────────
            This is an automated alert from your CI pipeline.
            WISH PMS QA — Front-Desk Automation Suite

      # ── 9. Fail the job officially after email is sent ────────────────────
      - name: Mark job as failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1